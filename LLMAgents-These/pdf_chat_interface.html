<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface PDF et Chat LLM</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Styles spécifiques pour cette interface */
        .main_container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        .document-selector {
            flex: 1;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            background: white;
            max-width: 300px;
        }
        
        .document-list {
            list-style: none;
            padding: 0;
        }
        
        .document-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .document-item:hover {
            background-color: #f8f9fa;
        }
        
        .document-item.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .document-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }
        
        .document-item p {
            margin: 0;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .pdf-viewer {
            flex: 2;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }
        
        .pdf-viewer iframe {
            width: 100%;
            height: 90vh;
            border: none;
        }
        
        .container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0 20px 20px 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .chat-container {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            flex: 1;
        }
        
        .input-container {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        #sendButton {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .loading-documents {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .spinner-small {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            animation: spin 1s linear infinite;
            margin: 0 auto 5px;
            display: inline-block;
        }
    </style>
    </style>
</head>
<body>
    <div class="main_container">
        <div class="document-selector">
            <h3>Documents disponibles</h3>
            <div class="loading-documents" id="loadingDocuments">
                <div class="spinner-small"></div>
                <p>Chargement des documents...</p>
            </div>
            <ul class="document-list" id="documentList">
                <!-- Les documents seront chargés dynamiquement ici -->
            </ul>
        </div>
        
        <div class="pdf-viewer">
            <h2>Document PDF</h2>
            <iframe id="pdf-iframe" src=""></iframe>
        </div>
        
        <div class="container">
            <div class="header">
                <div class="header-main">
                    <h1>🤖 Chatbot RAG M3C</h1>
                    <p class="subtitle">Système de Questions/Réponses sur documents</p>
                </div>
                <div class="header-nav">
                    <a href="example_frontend.html" class="nav-link">Interface Standard</a>
                    <span class="nav-separator">|</span>
                    <a href="pdf_chat_interface.html" class="nav-link active">Interface PDF+Chat</a>
                </div>
            </div>
            
            <div class="chat-container" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        👋 Bonjour ! Je suis votre assistant. Posez-moi des questions sur le document PDF.<br><br>
                    </div>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Recherche en cours...</p>
            </div>
            
            <div class="input-container">
                <input
                    type="text"
                    id="questionInput"
                    placeholder="Posez votre question sur le document..."
                    onkeypress="if(event.key==='Enter') sendQuestion()"
                >
                <button id="sendButton" onclick="sendQuestion()">Envoyer</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL_RAG = 'http://localhost:8000/api/query/rag';
        const API_URL_DOCUMENTS = 'http://localhost:8000/api/documents';
        const chatContainer = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');
        const loading = document.getElementById('loading');
        const pdfIframe = document.getElementById('pdf-iframe');
        const documentList = document.getElementById('documentList');
        const loadingDocuments = document.getElementById('loadingDocuments');
        
        let currentDocument = null;
        
        // Fonction pour charger un PDF
        function loadPDF(pdfUrl) {
            pdfIframe.src = pdfUrl;
        }
        
        // Fonction pour charger la liste des documents
        async function loadDocuments() {
            try {
                const response = await fetch(API_URL_DOCUMENTS);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                displayDocuments(data.documents);
                
            } catch (error) {
                console.error('Erreur:', error);
                documentList.innerHTML = '<li class="error">Erreur lors du chargement des documents</li>';
            } finally {
                loadingDocuments.style.display = 'none';
            }
        }
        
        // Fonction pour afficher les documents
        function displayDocuments(documents) {
            documentList.innerHTML = '';
            
            if (documents.length === 0) {
                documentList.innerHTML = '<li class="no-documents">Aucun document disponible</li>';
                return;
            }
            
            documents.forEach(doc => {
                const docItem = document.createElement('li');
                docItem.className = 'document-item';
                docItem.innerHTML = `
                    <h4>${doc.file_name}</h4>
                    <p>Taille: ${formatFileSize(doc.file_size)}</p>
                    <p>Créé: ${formatDate(doc.created_at)}</p>
                `;
                docItem.onclick = () => selectDocument(doc);
                documentList.appendChild(docItem);
            });
        }
        
        // Fonction pour sélectionner un document
        function selectDocument(doc) {
            // Désélectionner tous les éléments
            const items = document.querySelectorAll('.document-item');
            items.forEach(item => item.classList.remove('active'));
            
            // Sélectionner l'élément cliqué
            event.target.closest('.document-item').classList.add('active');
            
            currentDocument = doc;
            
            // Charger le PDF
            const pdfUrl = `http://localhost:8000/get_pdf?source_file=${encodeURIComponent(doc.file_name)}`;
            loadPDF(pdfUrl);
            
            // Ajouter un message dans le chat
            addMessage(`Document sélectionné: ${doc.file_name}`, 'bot');
        }
        
        // Fonction pour formater la taille du fichier
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' octets';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' Ko';
            return (bytes / (1024 * 1024)).toFixed(2) + ' Mo';
        }
        
        // Fonction pour formater la date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        // Fonction pour envoyer une question
        async function sendQuestion() {
            const question = questionInput.value.trim();
            
            if (!question) {
                alert('Veuillez entrer une question');
                return;
            }
            
            // Ajouter le message de l'utilisateur
            addMessage(question, 'user');
            questionInput.value = '';
            
            // Désactiver le bouton et afficher le loading
            sendButton.disabled = true;
            loading.classList.add('active');
            
            try {
                const response = await fetch(API_URL_RAG, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        use_rag: true,
                        use_reranking: true,
                        use_ontology_enrichment: true,
                        k: 3
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                addBotResponse(data);
                
            } catch (error) {
                console.error('Erreur:', error);
                addMessage('Erreur lors de la communication avec le serveur.', 'bot');
            } finally {
                sendButton.disabled = false;
                loading.classList.remove('active');
            }
        }
        
        // Fonction pour ajouter un message au chat
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Fonction pour ajouter une réponse du bot
        function addBotResponse(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Ajouter la réponse principale
            const responseContent = document.createElement('div');
            responseContent.innerHTML = marked.parse(data.answer);
            contentDiv.appendChild(responseContent);
            
            // Ajouter les sources si présentes
            if (data.sources && data.sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = '<strong>📚 Sources:</strong>';
                
                data.sources.forEach((source, index) => {
                    const sourceItem = document.createElement('div');
                    sourceItem.className = 'source-item';
                    sourceItem.innerHTML = `<strong>${index + 1}. Page ${source.metadata.num_page || '?'}</strong>: ${source.content.substring(0, 100)}...`;
                    sourcesDiv.appendChild(sourceItem);
                });
                
                contentDiv.appendChild(sourcesDiv);
            }
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Charger les documents au démarrage
        loadDocuments();
        
        // Auto-focus sur l'input au chargement
        questionInput.focus();
        
        // Exemple de chargement d'un PDF (à adapter selon vos besoins)
        // loadPDF('http://localhost:8000/get_pdf?source_file=exemple.pdf');
    </script>
</body>
</html>
